version: '3.8'

services:
  database:
    image: mongo:6.0-jammy
    container_name: smartlibrary_db
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - library_net

  mqtt_broker:
    image: emqx/emqx:5.1.0
    container_name: smartlibrary_broker
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "8883:8883"
      - "18083:18083"
    volumes:
      - emqx_data:/opt/emqx/data
    networks:
      - library_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartlibrary_api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGO_URI=mongodb://database:27017/smartlibrary
      - MQTT_BROKER_URL=mqtt://mqtt_broker:1883
      - JWT_SECRET=production_secret_session_token_key_19283
    depends_on:
      - database
      - mqtt_broker
    networks:
      - library_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smartlibrary_web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - library_net

volumes:
  mongo_data:
  emqx_data:

networks:
  library_net:
    driver: bridge
